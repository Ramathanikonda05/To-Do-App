<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Todo{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    
    <!-- Empty div for left space -->
    <div></div>
    
    <!-- Centered TaskZen -->
    <a class="navbar-brand text-danger fs-3 mx-auto" href="{% url 'task_list' %}">TaskZen</a>
    
    <!-- Auth buttons aligned right -->
    <div class="ms-auto">
      {% if user.is_authenticated %}
        <span class="me-2">Hi, {{ user.username }}!</span>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
        </form>
      {% else %}
        <a class="btn btn-outline-primary btn-sm me-2" href="{% url 'login' %}">Login</a>
        <a class="btn btn-primary btn-sm" href="{% url 'register' %}">Register</a>
      {% endif %}
    </div>
    
  </div>
</nav>


<div class="container">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
